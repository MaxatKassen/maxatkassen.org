      <h3><center>Международная научная премия - "The Highly Ranked Scholar Award 2024 (ScholarGPS, США)" за значительные научные достижения (ScholarGPS, США)</center></h3><p></p><p></p>
    <p class="demopara" align="justify"> В декабре 2024 года профессор Максат КАСЕН (Maxat KASSEN) вошел в топ 0,05% самых влиятельных ученых мира в области изучения феномена электронного правительства по версии Highly Ranked Scholars - 2024 (ScholarGPS, США). Это один из самых престижных мировых рейтингов, оценивающих вклад исследователей за всю карьеру.</p>
<p class="demopara" align="justify">Рейтинг Highly Ranked Scholars учитывает три ключевых критерия:</p>
<p class="demopara" align="justify">
    • продуктивность (количество публикаций),<br>
    • влияние (уровень цитирования),<br>
    • качество исследований (h-индекс).<br></p>
    
     <p class="demopara" align="justify"> Анализ проводится на основе базы данных ScholarGPS — одной из крупнейших в мире систем научной аналитики, охватывающей более 200 миллионов публикаций и 30 миллионов профилей ученых. Рейтинг учитывает не только текущие достижения, но и вклад за всю карьеру. Рейтинг Highly Ranked Scholars охватывает всех ученых, включая даже тех, кто завершил активную исследовательскую деятельность, что делает это достижение особенно значимым.
</p>
     <p class="demopara" align="justify"> Включение профессора Максат КАСЕНА в этот элитный список — еще одно подтверждение международного признания его работ в области изучения научного феномена электронного правительства и смежных дисциплин. Ранее ученый неоднократно получал международные научные награды, в том числе такие престижные как: 1) международная научная премия имени сенатора Фулбрайта - «Fulbright Scholar Award - 2012» (Федеральное правительство, г. Вашингтон, США), 2) международная научная награда - Scopus Award — 2018 (агентство Elsevier, Нидерланды), а также премию «Leader of Science: Web of Science Award 2020 (агентство Clarivate Analytics, США). С 2020 года он ежегодно возглавляет рейтинг лучших ученых мира и входит в 2% самых цитируемых исследователей мира по версии Стэнфордского Университета (США). </p>
         <p class="demopara" align="justify"> При позиционировании в рейтинге учитывались многочисленные публикации ученого, результативность работы и высокое качество научных трудов, цитируемость и индекс Хирша. В рейтинги ScholarGPS профессор Максат КАСЕН занимает высокую позицию уже третий год подряд. </p>
